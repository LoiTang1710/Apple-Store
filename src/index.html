<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/dist/css/index.css" />
    <link
      rel="shortcut icon"
      href="./img/apple-logo-svgrepo-com.svg"
      type="image/x-icon"
    />
    <title>Apple Store</title>

    <!-- JAVASCRIPT -->
    <script src="./js/components/cardshelf.js" defer></script>
    <script src="./js/components/listProducts.js" defer></script>
    <script src="./js/components/carousel.js" defer></script>
    <script src="./js/main.js" defer></script>
  </head>
  <body>
    <header>
      <nav>
        <a href="index.html">
          <img src="./img/apple-logo-svgrepo-com.svg" alt="apple-logo" />
        </a>
        <div>
          <ul>
            <li><a href="store.html">Cửa hàng</a></li>
            <li><a href="">Mac</a></li>
            <li><a href="">iPad</a></li>
            <li><a href="">iPhone</a></li>
            <li><a href="">Watch</a></li>
            <li><a href="">AirPods</a></li>
            <li><a href="">TV & Home</a></li>
            <li><a href="">Only on Apple</a></li>
            <li><a href="">Accessories</a></li>
            <li><a href="">Support</a></li>
          </ul>
        </div>
        <div>
          <img src="./img/search-svgrepo-com.svg" alt="" />
          <img src="./img/bag-3-svgrepo-com.svg" alt="" />
        </div>
      </nav>
    </header>
    <main>
      <section class="section-wrapper">
        <section class="section-homepage">
          <div class="section-content">
            <h1>iPhone</h1>
            <p>Meet the lastest iPhone lineup.</p>
            <div class="section-button">
              <button class="button button-filled">Learn more</button
              ><button class="button button-outlined">Shop iPhone</button>
            </div>
          </div>
          <div class="section-img">
            <img
              src="https://www.apple.com/v/home/cm/images/heroes/iphone-family/hero_iphone_family__fuz5j2v5xx6y_large_2x.jpg"
              alt="iPhone 17 Pro"
            />
          </div>
        </section>
        <section class="section-homepage">
          <div class="section-content">
            <h1>iPad air</h1>
            <p>Now supercharged by M4.</p>
            <div class="section-button">
              <button class="button button-filled">Learn more</button
              ><button class="button button-outlined">Shop iPad</button>
            </div>
          </div>
          <div class="section-img">
            <img
              src="https://www.apple.com/v/home/cm/images/heroes/ipad-air-m4/hero_ipad_air_m4__ew8k92mk1w6e_large_2x.jpg"
              alt="iPad M4"
            />
          </div>
        </section>
        <section class="section-homepage">
          <div class="section-content section-dark">
            <h1>Macbook Pro</h1>
            <p>Now with M5, M5 Pro, and M5 max.</p>
            <div class="section-button">
              <button class="button button-filled">Learn more</button
              ><button class="button button-outlined">Shop Macbook</button>
            </div>
          </div>
          <div class="section-img">
            <img 
              src="https://www.apple.com/v/macbook-pro/ax/images/overview/welcome/hero_endframe__fwev9ebh42mq_xlarge.jpg"
              alt="Macbook Pro"
              class="img-center-bottom"
            />
          </div>
        </section>
      </section>
      <section class="section-grid-contaienr">
        <div>
          <div></div>
          <div></div>
          <div></div>
          <div></div>
          <div></div>
          <div></div>
        </div>
      </section>
    </main>
  </body>
</html>
